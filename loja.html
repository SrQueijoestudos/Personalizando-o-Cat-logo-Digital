<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOJA DO FRITZ</title>

<!-- Fonte do Google -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background: linear-gradient(to bottom, #05ecec, blue);
    min-height: 100vh;
}

header{
    background:#004c66;
    color:white;
    text-align:center;
    padding:25px;
}

header h1{
    font-family:'Orbitron', sans-serif;
    font-size:55px;
    letter-spacing:3px;
    color:#00e5ff;
    text-shadow:0 0 10px #00e5ff, 0 0 20px #008cff;
}

header p{
    font-size:18px;
    margin-top:10px;
}

#produtos{
    width:90%;
    max-width:1000px;
    margin:30px auto;
}

.card{
    background:white;
    display:flex;
    align-items:center;
    gap:20px;
    padding:20px;
    margin-bottom:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.02);
}

.card img{
    width:180px;
    height:180px;
    object-fit:cover;
    border-radius:10px;
}

.info{
    flex:1;
}

.info h2{
    color:#004c66;
    margin-bottom:10px;
}

.info p{
    margin-bottom:10px;
    color:#333;
}

.preco{
    color:green;
    font-size:24px;
    font-weight:bold;
}

button{
    background:#0077cc;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

button:hover{
    background:#004c99;
}
.card-avaliacao{
    margin-top:20px;
    padding:15px;
    background:#f8f8f8;
    border-radius:12px;
    border-left:5px solid gold;
}

.perfil{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:10px;
}

.perfil img{
    width:55px;
    height:55px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #0077cc;
}

.perfil h4{
    margin:0;
    color:#004c66;
}

.estrelas{
    color:#FFD700;
    font-size:22px;
}

.comentario{
    color:#444;
    font-style:italic;
}
footer{
    margin-top:40px;
    background:#004c66;
    color:white;
    text-align:center;
    padding:20px;
}
</style>

</head>
<body>

<header>
    <h1>🖥️ LOJA DO FRITZ</h1>
    <p>Os melhores eletrônicos com os melhores preços!</p>
</header>

<div id="produtos"></div>

<footer>
    © 2026 Loja do Fritz - Todos os direitos reservados.
</footer>

<script>

let produtos = [

{
    nome:"Notebook ASUS VivoBook S14",
    preco:5499.90,
    descricao:"Notebook Intel Core i7, 16GB RAM, SSD 512GB e placa de vídeo dedicada.",
    imagem:"https://fastshopbr.vtexassets.com/arquivos/ids/4690488/17774671305318.jpg?v=639130677720670000",
    // Card avaliador
    usuario:"Tomas Turbando",
    fotoPerfil:"https://i.pinimg.com/236x/9f/1c/f1/9f1cf11f2e0749791b8cd24f4fee6937.jpg",
    pontuacaoAvaliacao:"⭐⭐⭐⭐⭐",
    avaliacao:"Ótimo para segurar a porta, recomendo."
},

{
    nome:"Motorola M35",
    preco:2499.90,
    descricao:"Tela AMOLED 6.7'', câmera de 108MP e bateria de longa duração.",
    imagem:"https://http2.mlstatic.com/D_Q_NP_983786-MLA99479656582_112025-O.webp",
    // Card avaliador
    usuario:"Ana Souza",
    fotoPerfil:"https://i.pinimg.com/200x150/05/af/15/05af15ff9dcc9723c835d7ff1bdc6805.jpg",
    pontuacaoAvaliacao:"⭐⭐⭐⭐☆",
    avaliacao:"Excelente celular para tacar no meu filho, duro igual uma pedra e esquenta igual lava, recomendo."
},

{
    nome:"Headset Gamer",
    preco:399.90,
    descricao:"Som estéreo, microfone de alta qualidade e iluminação RGB.",
    imagem:"https://m.media-amazon.com/images/I/61pvhJpLRRL._AC_UF894,1000_QL80_.jpg",
    // Card avaliador
    usuario:"Paulu Brificado",
    fotoPerfil:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQnd7voxN1SF8DEH5Rp61VviBSP2U9QmJUEMecQQwUv6w&s=10",
    pontuacaoAvaliacao:"⭐⭐⭐⭐⭐",
    avaliacao:"Muito desconfortável e o áudio é horrívelmente bom para lubrificar"
},

{
    nome:"Monitor LG UltraGear 24GS60F-B",
    preco:1499.90,
    descricao:"Monitor 27'' Full HD, 165Hz e tempo de resposta de 1ms.",
    imagem:"https://files.tecnoblog.net/wp-content/uploads/2023/07/lg-monitor-ultragear-curvo-1060x704.webp",
    // Card avaliador
    usuario:"Fernanda Lima",
    fotoPerfil:"https://i.pinimg.com/236x/bb/e7/7c/bbe77cfaab0951e2f783993fedc191b4.jpg",
    pontuacaoAvaliacao:"⭐⭐⭐⭐⭐",
    avaliacao:"Perfeito para ver COISAS em ultra HD"
}

];
function comprar(){
    alert("⚠️ ATENÇÃO: ESTOQUE ZERADO NO MOMENTO ⚠️ \n (Tomamos processo e fomos obrigados a parar de vender)");
}
function listarProdutos(){

    let area = document.getElementById("produtos");
    area.innerHTML = "";

    for(let i = 0; i < produtos.length; i++){

       area.innerHTML += `
<div class="card">

    <img src="${produtos[i].imagem}" alt="${produtos[i].nome}">

    <div class="info">

        <h2>${produtos[i].nome}</h2>

        <p>${produtos[i].descricao}</p>

        <p class="preco">
            R$ ${produtos[i].preco.toFixed(2).replace(".",",")}
        </p>

        <button onclick="comprar()">Comprar</button>

        <div class="card-avaliacao">

            <div class="perfil">

                <img src="${produtos[i].fotoPerfil}">

                <div>

                    <h4>${produtos[i].usuario}</h4>

                    <div class="estrelas">
                        ${produtos[i].pontuacaoAvaliacao}
                    </div>

                </div>

            </div>

            <p class="comentario">
                "${produtos[i].avaliacao}"
            </p>

        </div>

    </div>

</div>
`;
    }
}

listarProdutos();

</script>

</body>
</html>
