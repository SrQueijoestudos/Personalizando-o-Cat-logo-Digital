<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOJA DO FRITZ - Painel Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">

<style>
*{ 
    margin:0; 
    padding:0; 
    box-sizing:border-box; 
    font-family:Arial, Helvetica, sans-serif; 
}
body{
    background: linear-gradient(to bottom, #05ecec, blue); 
    min-height: 100vh; 
}
header{
    background:#004c66; 
    color:white; 
    text-align:center; 
    padding:25px; 
    position: relative;
}
header h1{
    font-family:'Orbitron', sans-serif; 
    font-size:42px; 
    letter-spacing:2px; 
    color:#00e5ff; 
    text-shadow:0 0 10px #00e5ff, 0 0 20px #008cff; 
}
header p{ font-size:18px; margin-top:5px; margin-bottom: 20px; }

/* ESTILOS DO PAINEL DE CONTROLO DO ADMIN */
.painel {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
    text-align: left;
}
.bloco {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    padding: 20px;
    border-radius: 12px;
}
.bloco h2 {
    font-size: 20px;
    margin-bottom: 15px;
    color: #00e5ff;
}
.linha {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}
.linha input, .linha select {
    flex: 1;
    min-width: 180px;
    padding: 10px;
    border-radius: 6px;
    border: none;
    font-size: 15px;
}
.linha button {
    padding: 10px 20px;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
}
.btn-add { background: #10b981; color: white; border: none; }
.btn-add:hover { background: #059669; }

.btn-limpar { background: #6b7280; color: white; border: none; }
.btn-limpar:hover { background: #4b5563; }

.btn-restaurar { background: #f59e0b; color: white; border: none; }
.btn-restaurar:hover { background: #d97706; }

.btn-desfazer { background: #8b5cf6; color: white; border: none; }
.btn-desfazer:hover { background: #7c3aed; }

/* AREA DOS PRODUTOS */
#produtos{ width:90%; max-width:1000px; margin:30px auto; } 
.card{ 
    background:white;
    display:flex; 
    align-items:center; 
    gap:20px; 
    padding:20px;
    margin-bottom:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    transition:0.3s; 
    position: relative;
}
.card:hover{ transform:scale(1.01); } 
.card img{ width:180px; height:180px; object-fit:cover; border-radius:10px; } 
.info{ flex:1; } 
.info h2{ color:#004c66; margin-bottom:10px; } 
.info p{ margin-bottom:10px; color:#333; } 
.preco{ color:green; font-size:24px; font-weight:bold; margin-bottom: 10px; } 

.btn-excluir-card {
    background: #ef4444;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    margin-top: 10px;
}
.btn-excluir-card:hover { background: #dc2626; }

.card-avaliacao{ 
    margin-top:15px; padding:15px;
    background:#f8f8f8; border-radius:12px;
    border-left:5px solid gold; 
}
.perfil{ display:flex; align-items:center; gap:12px; margin-bottom:10px; } 
.perfil img{
    width:55px; height:55px; border-radius:50%; 
    object-fit:cover; border:2px solid #0077cc;
}
.perfil h4{ margin:0; color:#004c66; } 
.estrelas{ color:#FFD700; font-size:22px; } 
.comentario{ color:#444; font-style:italic; } 

footer{
    margin-top:40px; background:#004c66;
    color:white; text-align:center; padding:20px;
}
.sair{ 
    position:absolute; top:20px; right:20px;
    background:#ef4444; color:white; border:none;
    padding:10px 18px; border-radius:8px; cursor:pointer;
    font-weight:bold;
}
.sair:hover{ background:#dc2626; }
</style>
</head>
<body>

<header>
    <button class="sair" onclick="sair()">🚪 Sair</button>
    <h1>🖥️ LOJA DO FRITZ - Setor Administrativo</h1>
    <p>Painel de Gestão e Controlo de Produtos</p>

    <div class="painel">
        <div class="bloco">
            <h2>➕ Adicionar Novo Item</h2>
            <div class="linha">
                <input type="text" id="nomeItem" placeholder="Nome do item *">
                <input type="number" id="precoItem" placeholder="Preço (R$) *" step="0.01">
                <input type="text" id="imagemItem" placeholder="URL da imagem (opcional)">
                <input type="text" id="descricaoItem" placeholder="Descrição (opcional)">
                <select id="pontuacaoItem">
                    <option value="⭐">⭐ (1 estrela)</option>
                    <option value="⭐⭐">⭐⭐ (2 estrelas)</option>
                    <option value="⭐⭐⭐">⭐⭐⭐ (3 estrelas)</option>
                    <option value="⭐⭐⭐⭐">⭐⭐⭐⭐ (4 estrelas)</option>
                    <option value="⭐⭐⭐⭐⭐" selected>⭐⭐⭐⭐⭐ (5 estrelas)</option>
                </select>
                <button class="btn-add" onclick="adicionarItem()">Adicionar Produto</button>
            </div>
        </div>
        
        <div class="bloco">
            <h2>🔍 Filtrar & Ações Globais</h2>
            <div class="linha">
                <input type="text" id="buscaItem" placeholder="Pesquisar produto pelo nome..." oninput="listarProdutos()">
                <button class="btn-limpar" onclick="document.getElementById('buscaItem').value=''; listarProdutos();">Limpar Filtro</button>
                <button class="btn-desfazer" id="btnDesfazer" onclick="desfazerRemocao()" style="display:none;">↺ Cancelar Última Remoção</button>
                <button class="btn-restaurar" onclick="restaurarPadrao()">🔄 Restaurar Padrão de Fábrica</button>
            </div>
        </div>
    </div>
</header>

<div id="produtos"></div>

<footer>
    © 2026 Loja do Fritz - Painel do Administrador.
</footer>

<script>
const CHAVE = "produtosLoja";

let produtosPadrao = [
    {
        nome: "Notebomba",
        preco: 5499.90,
        descricao: "Notebomba ótimo para usar de peso para porta.",
        imagem: "https://fastshopbr.vtexassets.com/arquivos/ids/4690488/17774671305318.jpg?v=639130677720670000",
        usuario: "Tomas Turbando",
        fotoPerfil: "https://i.pinimg.com/236x/9f/1c/f1/9f1cf11f2e0749791b8cd24f4fee6937.jpg",
        pontuacaoAvaliacao: "⭐⭐⭐⭐⭐",
        avaliacao: "Ótimo para segurar a porta, recomendo."
    },
    {
        nome: "Motobunda",
        preco: 2499.90,
        descricao: "Tela quebrada, usando um plástico de visor e bateria de longa duração (saiu da tomada apaga).",
        imagem: "https://http2.mlstatic.com/D_Q_NP_983786-MLA99479656582_112025-O.webp",
        usuario: "Tomé Enstruando",
        fotoPerfil: "https://i.pinimg.com/200x150/05/af/15/05af15ff9dcc9723c835d7ff1bdc6805.jpg",
        pontuacaoAvaliacao: "⭐⭐⭐⭐☆",
        avaliacao: "Excelente celular para tacar no meu filho, duro igual uma pedra e esquenta igual lava."
    },
    {
        nome: "Headcut funcional",
        preco: 399.90,
        descricao: "Som estourado, com lâminas em formatos estranhos.",
        imagem: "https://m.media-amazon.com/images/I/61pvhJpLRRL._AC_UF894,1000_QL80_.jpg",
        usuario: "Paulu Brificado",
        fotoPerfil: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQnd7voxN1SF8DEH5Rp61VviBSP2U9QmJUEMecQQwUv6w&s=10",
        pontuacaoAvaliacao: "⭐⭐⭐⭐⭐",
        avaliacao: "Muito desconfortável e o áudio é terrivelmente bom para lubrificar."
    },
    {
        nome: "Monitorta",
        preco: 1499.90,
        descricao: "Monitor de responsa, é torto a 90° (partiu ao meio), gerando uma visão privilegiada.",
        imagem: "https://files.tecnoblog.net/wp-content/uploads/2023/07/lg-monitor-ultragear-curvo-1060x704.webp",
        usuario: "Tommy Leite",
        fotoPerfil: "https://i.pinimg.com/236x/bb/e7/7c/bbe77cfaab0951e2f783993fedc191b4.jpg",
        pontuacaoAvaliacao: "⭐⭐⭐⭐⭐",
        avaliacao: "Perfeito para ver COISAS em ultra HD."
    }
];

let ultimoRemovido = null; // Guarda o último item excluído para poder desfazer

if (localStorage.getItem(CHAVE) === null) {
    localStorage.setItem(CHAVE, JSON.stringify(produtosPadrao));
}

function carregarProdutos() {
    return JSON.parse(localStorage.getItem(CHAVE)) || [];
}

function salvar(itens) {
    localStorage.setItem(CHAVE, JSON.stringify(itens));
}

function sair() {
    window.location.href = "login.html";
}

// RESTAURAR PRODUTOS INICIAIS
function restaurarPadrao() {
    if (confirm("Tem certeza que deseja restaurar o catálogo de produtos padrão de fábrica?")) {
        salvar(produtosPadrao);
        ultimoRemovido = null;
        document.getElementById("btnDesfazer").style.display = "none";
        listarProdutos();
        alert("Catálogo padrão restaurado com sucesso!");
    }
}

// ADICIONAR ITEM
function adicionarItem() {
    let nome = document.getElementById("nomeItem").value.trim();
    let preco = document.getElementById("precoItem").value;
    let imagem = document.getElementById("imagemItem").value.trim();
    let descricao = document.getElementById("descricaoItem").value.trim();
    let pontuacao = document.getElementById("pontuacaoItem").value;

    if (nome === "" || preco === "") {
        alert("Preencha pelo menos o Nome e o Preço.");
        return;
    }

    let itens = carregarProdutos();
    itens.push({
        nome: nome,
        preco: parseFloat(preco),
        imagem: imagem || "https://via.placeholder.com/180?text=Sem+Imagem",
        descricao: descricao || "Produto novo adicionado pelo exunte cadeirante.",
        usuario: "desconhecido",
        fotoPerfil: "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100",
        pontuacaoAvaliacao: pontuacao,
        avaliacao: "Produto cadastrado e verificado pela equipe do exunte cadeirante."
    });

    salvar(itens);

    // Limpa os campos
    document.getElementById("nomeItem").value = "";
    document.getElementById("precoItem").value = "";
    document.getElementById("imagemItem").value = "";
    document.getElementById("descricaoItem").value = "";

    listarProdutos();
}

// REMOVER ITEM
function removerItem(indiceOriginal) {
    let itens = carregarProdutos();
    if (!confirm(`Remover o produto "${itens[indiceOriginal].nome}"?`)) return;

    // Guarda item removido para permitir cancelar remoção
    ultimoRemovido = {
        item: itens[indiceOriginal],
        posicao: indiceOriginal
    };

    itens.splice(indiceOriginal, 1);
    salvar(itens);

    // Exibe o botão de desfazer
    document.getElementById("btnDesfazer").style.display = "inline-block";
    listarProdutos();
}

// CANCELAR A ÚLTIMA REMOÇÃO (DESFAZER)
function desfazerRemocao() {
    if (!ultimoRemovido) return;

    let itens = carregarProdutos();
    itens.splice(ultimoRemovido.posicao, 0, ultimoRemovido.item);
    salvar(itens);

    ultimoRemovido = null;
    document.getElementById("btnDesfazer").style.display = "none";
    listarProdutos();
    alert("Remoção cancelada! O produto voltou à loja.");
}

// LISTAR E FILTRAR OS CARDS VISUAIS DE FORMA COMPLETA
function listarProdutos() {
    let produtos = carregarProdutos();
    let busca = document.getElementById("buscaItem").value.toLowerCase().trim();
    let area = document.getElementById("produtos");
    area.innerHTML = "";

    if (produtos.length === 0) {
        area.innerHTML = "<p style='text-align:center;color:white;font-size:20px;padding:40px;'>Nenhum produto cadastrado na loja.</p>";
        return;
    }

    let encontrados = 0;

    for (let i = 0; i < produtos.length; i++) {
        let p = produtos[i];

        // Se houver busca e o nome/descrição não corresponderem, esconde o produto
        if (busca !== "" && !p.nome.toLowerCase().includes(busca) && !p.descricao.toLowerCase().includes(busca)) {
            continue;
        }

        encontrados++;

        let imagem = p.imagem || "https://via.placeholder.com/180?text=Sem+Imagem";
        let descricao = p.descricao || "Sem descrição disponível.";
        let usuario = p.usuario || "Cliente Anônimo";
        let fotoPerfil = p.fotoPerfil || "https://via.placeholder.com/55";
        let pontuacao = p.pontuacaoAvaliacao || "⭐⭐⭐⭐⭐";
        let avaliacao = p.avaliacao || "Ainda sem comentários.";

        area.innerHTML += `
        <div class="card">
            <img src="${imagem}" alt="${p.nome}">
            <div class="info">
                <h2>${p.nome}</h2>
                <p>${descricao}</p>
                <p class="preco">R$ ${Number(p.preco).toFixed(2).replace(".", ",")}</p>
                
                <button class="btn-excluir-card" onclick="removerItem(${i})">🗑️ Apagar Produto</button>

                <div class="card-avaliacao">
                    <div class="perfil">
                        <img src="${fotoPerfil}">
                        <div>
                            <h4>${usuario}</h4>
                            <div class="estrelas">${pontuacao}</div>
                        </div>
                    </div>
                    <p class="comentario">"${avaliacao}"</p>
                </div>
            </div>
        </div>
        `;
    }

    if (encontrados === 0) {
        area.innerHTML = `<p style='text-align:center;color:white;font-size:20px;padding:40px;'>Nenhum produto corresponde à pesquisa "${busca}".</p>`;
    }
}

// Sincroniza abas abertas simultaneamente
window.addEventListener("storage", function(e) {
    if (e.key === CHAVE) {
        listarProdutos();
    }
});

listarProdutos();
</script>

</body>
</html>
