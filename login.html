<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja do Fritz - Login</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#0f172a,#1d4ed8,#2563eb);
}
.container{
    width:380px;
    background:rgba(255,255,255,.1);
    backdrop-filter:blur(15px);
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.4);
    color:white;
}
h1{text-align:center;margin-bottom:10px;font-size:28px;}
p{text-align:center;margin-bottom:20px;color:#ddd;}
.menu{display:flex;gap:10px;margin-bottom:20px;}
.menu button{
    flex:1;
    background: rgba(255,255,255,0.2);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 8px;
    border-radius: 5px;
    cursor: pointer;
}
.menu button:hover{
    background: rgba(255,255,255,0.3);
}
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    font-size:16px;
}
button.action-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#00a8ff;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top: 10px;
}
button.action-btn:hover{background:#0090dd;}
#cadastro{display:none;}
#msg{margin-top:15px;text-align:center;color:#ffb3b3;}
</style>
</head>
<body>

<div class="container">
    <h1>🖥️ LOJA DO FRITZ</h1>
    <p>Login do Sistema</p>

    <div class="menu">
        <button onclick="mostrarLogin()">Login</button>
        <button onclick="mostrarCadastro()">Cadastro</button>
    </div>

    <div id="login">
        <input type="text" id="usuario" placeholder="Utilizador">
        <input type="password" id="senha" placeholder="Palavra-passe">
        <button class="action-btn" onclick="login()">Entrar</button>
    </div>

    <div id="cadastro">
        <input type="text" id="novoUsuario" placeholder="Novo utilizador">
        <input type="password" id="novaSenha" placeholder="Nova palavra-passe">
        <button class="action-btn" onclick="cadastrar()">Cadastrar</button>
    </div>

    <p id="msg"></p>
</div>

<script>
function mostrarLogin(){
    document.getElementById("login").style.display="block";
    document.getElementById("cadastro").style.display="none";
    document.getElementById("msg").innerHTML="";
}

function mostrarCadastro(){
    document.getElementById("login").style.display="none";
    document.getElementById("cadastro").style.display="block";
    document.getElementById("msg").innerHTML="";
}

function cadastrar(){
    let usuario = document.getElementById("novoUsuario").value.trim();
    let senha = document.getElementById("novaSenha").value;

    if(usuario === "" || senha === ""){
        alert("Preencha todos os campos.");
        return;
    }

    localStorage.setItem("user_" + usuario, senha);
    alert("Cadastro realizado com sucesso!");
    mostrarLogin();
}

function login(){
    let usuario = document.getElementById("usuario").value.trim();
    let senha = document.getElementById("senha").value;

    // Login do boneco de neve (teste rápido)
    if(usuario === "boneco de neve" && senha === "siu"){
        alert("Login especial do boneco de neve realizado com sucesso!")
        window.location.href = "https://media.tenor.com/NF6ixwAmrTMAAAAM/cristiano-ronaldo-drinking.gif";
        return;
    }

    // Login do administrador do sistema
    if(usuario === "Admin" && senha === "adm123"){
        alert("Login de Administrador realizado!");
        window.location.href = "loja_adm.html";
        return;
    }

    // Login de utilizadores registados
    let senhaSalva = localStorage.getItem("user_" + usuario);

    if(senhaSalva === null){
        document.getElementById("msg").innerHTML = "Utilizador não encontrado.";
        return;
    }

    if(senha !== senhaSalva){
        document.getElementById("msg").innerHTML = "Palavra-passe incorreta.";
        return;
    }

    alert("Login realizado com sucesso!");
    window.location.href = "loja.html";
}
</script>

</body>
</html>
