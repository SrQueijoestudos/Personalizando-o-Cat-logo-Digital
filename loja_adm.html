<!DOCTYPE html> <!-- Documento HTML5 -->
<html lang="pt-BR"> <!-- Idioma português do Brasil -->
<head>
<meta charset="UTF-8"> <!-- Suporte a acentos -->
<meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsivo -->
<title>LOJA DO FRITZ</title> <!-- Título da aba -->
<!-- Fonte personalizada do Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
<style>
*{ /* Reset básico em todos os elementos */
    margin:0; /* Zera margem */
    padding:0; /* Zera padding */
    box-sizing:border-box; /* Modelo de caixa previsível */
    font-family:Arial, Helvetica, sans-serif; /* Fonte padrão */
}
body{
    background: linear-gradient(to bottom, #05ecec, blue); /* Fundo em degradê ciano→azul */
    min-height: 100vh; /* Altura mínima da tela */
}
header{
    background:#004c66; /* Azul escuro */
    color:white; /* Texto branco */
    text-align:center; /* Centraliza o texto */
    padding:25px; /* Espaço interno */
}
header h1{
    font-family:'Orbitron', sans-serif; /* Fonte futurista */
    font-size:55px; /* Tamanho grande */
    letter-spacing:3px; /* Espaçamento entre letras */
    color:#00e5ff; /* Ciano brilhante */
    text-shadow:0 0 10px #00e5ff, 0 0 20px #008cff; /* Efeito neon */
}
header p{ font-size:18px; margin-top:10px; } /* Subtítulo */
#produtos{ width:90%; max-width:1000px; margin:30px auto; } /* Área central de produtos */
.card{ /* Card de cada produto */
    background:white;
    display:flex; /* Layout horizontal */
    align-items:center; /* Centraliza verticalmente */
    gap:20px; /* Espaço entre imagem e texto */
    padding:20px;
    margin-bottom:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    transition:0.3s; /* Suaviza o hover */
}
.card:hover{ transform:scale(1.02); } /* Cresce um pouco ao passar o mouse */
.card img{ width:180px; height:180px; object-fit:cover; border-radius:10px; } /* Imagem do produto */
.info{ flex:1; } /* Bloco de texto ocupa o restante */
.info h2{ color:#004c66; margin-bottom:10px; } /* Nome do produto */
.info p{ margin-bottom:10px; color:#333; } /* Descrição */
.preco{ color:green; font-size:24px; font-weight:bold; } /* Preço em destaque */
button{
    background:#0077cc; color:white; border:none;
    padding:12px 25px; border-radius:8px; cursor:pointer;
    font-size:16px; transition:0.3s;
}
button:hover{ background:#004c99; } /* Escurece no hover */
.card-avaliacao{ /* Caixa com o comentário do cliente */
    margin-top:20px; padding:15px;
    background:#f8f8f8; border-radius:12px;
    border-left:5px solid gold; /* Barra dourada à esquerda */
}
.perfil{ display:flex; align-items:center; gap:12px; margin-bottom:10px; } /* Linha do usuário */
.perfil img{
    width:55px; height:55px; border-radius:50%; /* Foto redonda */
    object-fit:cover; border:2px solid #0077cc;
}
.perfil h4{ margin:0; color:#004c66; } /* Nome do avaliador */
.estrelas{ color:#FFD700; font-size:22px; } /* Estrelas amarelas */
.comentario{ color:#444; font-style:italic; } /* Comentário em itálico */
footer{
    margin-top:40px; background:#004c66;
    color:white; text-align:center; padding:20px;
}
.sair{ /* Botão de sair no canto */
    position:fixed; top:20px; right:20px;
    background:#ef4444; color:white; border:none;
    padding:10px 18px; border-radius:8px; cursor:pointer;
    font-weight:bold; width:auto;
}
.sair:hover{ background:#dc2626; }
</style>
</head>
<body>
<button class="sair" onclick="sair()">🚪 Sair</button> <!-- Botão para voltar ao login -->
<header>
    <h1>🖥️ LOJA DO FRITZ - Setor Admnistrativo</h1> <!-- Título da loja -->
    <p>Os melhores eletrônicos com os melhores preços!</p> <!-- Slogan -->
    <div class="painel"> <!-- Painel central -->
    <div class="bloco"> <!-- Bloco: adicionar produto -->
        <h2>➕ Adicionar item</h2>
        <div class="linha">
            <input type="text" id="nomeItem" placeholder="Nome do item"> <!-- Nome -->
            <input type="number" id="precoItem" placeholder="Preço (R$)" step="0.01"> <!-- Preço -->
            <input type="text" id="imagemItem" placeholder="URL da imagem (opcional)"> <!-- Imagem opcional -->
            <input type="text" id="descricaoItem" placeholder="Descrição (opcional)"> <!-- Descrição opcional -->
            <select> id ="pontuacaoAvaliacao"
            <option value = ""> ⭐ </option>
            <option value = ""> ⭐⭐ </option>
            <option value = ""> ⭐⭐⭐</option>
            <option value = ""> ⭐⭐⭐⭐ </option>
            <option value = ""> ⭐⭐⭐⭐⭐ </option>
            </select>

            <button onclick="adicionarItem()">Adicionar</button> <!-- Botão adicionar -->
        </div>
    </div>
    
    <div class="bloco"> <!-- Bloco: buscar -->
        <h2>🔍 Buscar item</h2>
        <div class="linha">
            <input type="text" id="buscaItem" placeholder="Digite o nome..." oninput="renderizar()"> <!-- Busca ao vivo -->
            <button onclick="document.getElementById('buscaItem').value='';renderizar();">Limpar</button>
        </div>
    </div>
    <div class="lista" id="lista"></div> <!-- Onde a lista é renderizada -->
</div>
</header>
<div id="produtos"></div> <!-- Container onde os produtos serão inseridos via JS -->
<footer>
    © 2026 Loja do Fritz - Todos os direitos reservados.
</footer>
<script>
/* ============================================================
   PRODUTOS PADRÃO (aparecem só na PRIMEIRA vez que abre a loja).
   Depois disso, tudo é lido do localStorage compartilhado com o admin.
   ============================================================ */
let produtosPadrao = [ /* Lista inicial de produtos */
{
    nome:"Notebomba", /* Nome do produto */
    preco:5499.90, /* Preço em reais */
    descricao:"Notebomba ótimo para usar de peso para porta.",
    imagem:"https://fastshopbr.vtexassets.com/arquivos/ids/4690488/17774671305318.jpg?v=639130677720670000",
    usuario:"Tomas Turbando", /* Nome do avaliador */
    fotoPerfil:"https://i.pinimg.com/236x/9f/1c/f1/9f1cf11f2e0749791b8cd24f4fee6937.jpg",
    pontuacaoAvaliacao:"⭐⭐⭐⭐⭐", /* Estrelinhas */
    avaliacao:"Ótimo para segurar a porta, recomendo."
},
{
    nome:"Motobunda",
    preco:2499.90,
    descricao:"Tela quebrada, usando um plástico de visor e bateria de longa duração(saiu da tomada paga).",
    imagem:"https://http2.mlstatic.com/D_Q_NP_983786-MLA99479656582_112025-O.webp",
    usuario:"Tomé Enstruando",
    fotoPerfil:"https://i.pinimg.com/200x150/05/af/15/05af15ff9dcc9723c835d7ff1bdc6805.jpg",
    pontuacaoAvaliacao:"⭐⭐⭐⭐☆",
    avaliacao:"Excelente celular para tacar no meu filho, duro igual uma pedra e esquenta igual lava, recomendo."
},
{
    nome:"Headcut funcional",
    preco:399.90,
    descricao:"Som estourado, com lâminas em formatos estranhos.",
    imagem:"https://m.media-amazon.com/images/I/61pvhJpLRRL._AC_UF894,1000_QL80_.jpg",
    usuario:"Paulu Brificado",
    fotoPerfil:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQnd7voxN1SF8DEH5Rp61VviBSP2U9QmJUEMecQQwUv6w&s=10",
    pontuacaoAvaliacao:"⭐⭐⭐⭐⭐",
    avaliacao:"Muito desconfortável e o áudio é horrívelmente bom para lubrificar"
},
{
    nome:"Monitorta",
    preco:1499.90,
    descricao:"Monitor de responsa, é torto a 90°(partiu no meio), gerando uma visão pprevilegiada.",
    imagem:"https://files.tecnoblog.net/wp-content/uploads/2023/07/lg-monitor-ultragear-curvo-1060x704.webp",
    usuario:"Tommy Leite",
    fotoPerfil:"https://i.pinimg.com/236x/bb/e7/7c/bbe77cfaab0951e2f783993fedc191b4.jpg",
    pontuacaoAvaliacao:"⭐⭐⭐⭐⭐",
    avaliacao:"Perfeito para ver COISAS em ultra HD"
}
]; /* Fim da lista padrão */
/* CHAVE única do localStorage — os DOIS arquivos (loja e admin) usam a MESMA
   string. Isso é o que faz o admin e o cliente ficarem "em sintonia". */
const CHAVE = "produtosLoja";
/* Se ainda não existir nada salvo, gravamos a lista padrão.
   Assim, a primeira visita já mostra produtos e o admin também os vê. */
if(localStorage.getItem(CHAVE) === null){ /* Verifica se nunca foi salvo */
    localStorage.setItem(CHAVE, JSON.stringify(produtosPadrao)); /* Grava padrão */
}
/* Função que LÊ os produtos do localStorage (fonte única da verdade). */
function carregarProdutos(){
    return JSON.parse(localStorage.getItem(CHAVE)) || []; /* Converte texto→array */
}
function comprar(){ /* Simula a compra */
    alert("⚠️ ATENÇÃO: ESTOQUE ZERADO NO MOMENTO ⚠️ \n (Tomamos processo e fomos obrigados a parar de vender)");
}
function sair(){ /* Volta para a tela de login */
    window.location.href = "login.html";
}
function listarProdutos(){ /* Renderiza todos os cards na tela */
    let produtos = carregarProdutos(); /* Sempre pega a versão MAIS RECENTE */
    let area = document.getElementById("produtos"); /* Container onde inserir */
    area.innerHTML = ""; /* Limpa antes de redesenhar */
    if(produtos.length === 0){ /* Se não há nenhum produto */
        area.innerHTML = "<p style='text-align:center;color:white;font-size:20px;padding:40px;'>Nenhum produto disponível no momento.</p>";
        return; /* Sai */
    }
    for(let i = 0; i < produtos.length; i++){ /* Loop em cada produto */
       let p = produtos[i]; /* Atalho para o produto atual */
       /* Alguns campos podem não existir (produto adicionado pelo admin
          só tem nome e preço). Por isso usamos "||" para valores padrão. */
       let imagem = p.imagem || "https://via.placeholder.com/180?text=Sem+Imagem";
       let descricao = p.descricao || "Produto adicionado pelo satánas(Tá amarrado em nome de Jesus).";
       let usuario = p.usuario || "Cliente Anônimo";
       let fotoPerfil = p.fotoPerfil || "https://via.placeholder.com/55";
       let pontuacao = p.pontuacaoAvaliacao || "⭐⭐⭐⭐⭐";
       let avaliacao = p.avaliacao || "Ainda sem avaliações.";
       area.innerHTML += ` 
<div class="card"> <!-- Card do produto -->
    <img src="${imagem}" alt="${p.nome}"> <!-- Imagem -->
    <div class="info">
        <h2>${p.nome}</h2> <!-- Nome -->
        <p>${descricao}</p> <!-- Descrição -->
        <p class="preco">R$ ${Number(p.preco).toFixed(2).replace(".",",")}</p> <!-- Preço -->
        <button onclick="comprar()">Comprar</button> <!-- Botão comprar -->
        <div class="card-avaliacao">
            <div class="perfil">
                <img src="${fotoPerfil}">
                <div>
                    <h4>${usuario}</h4>
                    <div class="estrelas">${pontuacao}</div>
                </div>
            </div>
            <p class="comentario">"${avaliacao}"</p>
        </div>
    </div>
</div>`;
    }
}
listarProdutos(); /* Chama assim que a página carrega */
/* Escuta mudanças feitas em OUTRA aba (ex.: admin aberto em outra guia).
   Sempre que o localStorage muda, redesenhamos a lista automaticamente. */
window.addEventListener("storage", function(e){
    if(e.key === CHAVE){ /* Só nos interessa a nossa chave */
        listarProdutos(); /* Atualiza a tela */
    }
});

/* Carrega a lista atual do localStorage. Se ainda não existir, retorna array vazio. */
let itens = JSON.parse(localStorage.getItem(CHAVE)) || [];
/* Salva a lista atualizada de volta no localStorage. */
function salvar(){
    localStorage.setItem(CHAVE, JSON.stringify(itens)); /* Converte array→texto e grava */
}

/* Sai do painel e volta para a tela de login. */
function sair(){
    window.location.href = "login.html";
}

renderizar(); /* Chama ao abrir a página */
/* Se algum outro admin (outra aba) alterar a lista, sincroniza aqui também. */
window.addEventListener("storage", function(e){
    if(e.key === CHAVE){ /* Só quando a chave certa mudar */
        itens = JSON.parse(localStorage.getItem(CHAVE)) || []; /* Recarrega */
        renderizar(); /* Redesenha */
    }
});
function adicionarItem(){
    let nome = document.getElementById("nomeItem").value.trim(); /* Nome sem espaços extras */
    let preco = document.getElementById("precoItem").value; /* Preço digitado */
    let imagem = document.getElementById("imagemItem").value.trim(); /* Imagem (opcional) */
    let descricao = document.getElementById("descricaoItem").value.trim(); /* Descrição (opcional) */
    let pontuacao = document.getElementById("pontuacao").value.trim();
    if(nome==="" || preco===""){ /* Validação mínima */
        alert("Preencha nome e preço.");
        return; /* Não adiciona se faltar dado */
    }
    /* Monta o objeto do produto com os mesmos campos usados na loja do cliente. */
    itens.push({
        nome: nome, /* Nome do produto */
        preco: parseFloat(preco), /* Converte string→número */
        imagem: imagem, /* Pode ficar vazio; a loja usa placeholder */
        descricao: descricao, /* Pode ficar vazio */
        usuario: "Admin", /* Autor da avaliação padrão */
        fotoPerfil: "", /* Sem foto */
        pontuacaoAvaliacao: "⭐⭐⭐⭐⭐", /* 5 estrelas padrão */
        avaliacao: "Produto novo adicionado pelo administrador." /* Comentário padrão */
    });
    salvar(); /* Persiste no localStorage — cliente já enxerga na próxima abertura */
    /* Limpa os campos para facilitar o próximo cadastro */
    document.getElementById("nomeItem").value="";
    document.getElementById("precoItem").value="";
    document.getElementById("imagemItem").value="";
    document.getElementById("descricaoItem").value="";
    renderizar(); /* Atualiza a lista na tela do admin */
}
function renderizar(){
    let busca = document.getElementById("buscaItem").value.toLowerCase(); /* Texto buscado */
    let lista = document.getElementById("lista"); /* Container da lista */
    lista.innerHTML = ""; /* Limpa antes de redesenhar */
    /* Cria uma nova array só com o que combina com a busca,
       mantendo o índice ORIGINAL para conseguir remover corretamente. */
    let filtrados = itens
        .map((item,i)=>({item,i})) /* Guarda item + índice original */
        .filter(({item})=>item.nome.toLowerCase().includes(busca)); /* Filtra pelo nome */
    if(filtrados.length===0){ /* Nada encontrado */
        lista.innerHTML = '<p class="vazio">Nenhum item encontrado.</p>';
        return;
    }
    filtrados.forEach(({item,i})=>{ /* Para cada item filtrado */
        let div = document.createElement("div"); /* Cria a div do item */
        div.className = "item"; /* Aplica o estilo */
        div.innerHTML = `
            <div class="item-info">
                <span class="item-nome">${item.nome}</span>
                <span class="item-preco">R$ ${Number(item.preco).toFixed(2)}</span>
            </div>
            <button class="remover" onclick="removerItem(${i})">Remover</button>
        `;
        lista.appendChild(div); /* Adiciona no container */
    });
}
function removerItem(indice){
    if(!confirm("Remover este item?")) return; /* Pede confirmação */
    itens.splice(indice,1); /* Remove 1 elemento na posição "indice" */
    salvar(); /* Grava a nova lista — cliente perde esse item */
    renderizar(); /* Redesenha */
}

</script>
</body>
</html>
